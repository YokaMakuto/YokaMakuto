name: Update CLOC Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: write

jobs:
  cloc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cloc jq

      - name: Generate CLOC stats
        env:
          GH_TOKEN: ${{ secrets.CLOC_PAT }}
          GH_OWNER: YokaMakuto
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "CLOC_PAT secret is missing."
            exit 1
          fi

          workdir="$(mktemp -d)"
          repos_file="$workdir/repos.json"
          clone_root="$workdir/repos"
          mkdir -p "$clone_root"

          page=1
          printf '[]' > "$repos_file"
          while :; do
            response="$workdir/page-$page.json"
            curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/repos?visibility=all&affiliation=owner&per_page=100&page=$page" \
              > "$response"

            count="$(jq 'length' "$response")"
            if [ "$count" -eq 0 ]; then
              break
            fi

            jq -s '.[0] + .[1]' "$repos_file" "$response" > "$workdir/repos-next.json"
            mv "$workdir/repos-next.json" "$repos_file"
            page=$((page + 1))
          done

          jq -r --arg owner "$GH_OWNER" '.[] | select(.owner.login == $owner) | select(.archived == false) | select(.disabled == false) | .clone_url' "$repos_file" > "$workdir/clone_urls.txt"

          repo_count=0
          while IFS= read -r clone_url; do
            [ -z "$clone_url" ] && continue
            repo_dir="$clone_root/repo-$((repo_count + 1))"
            auth_url="${clone_url/https:\/\//https:\/\/x-access-token:${GH_TOKEN}@}"
            if git clone --quiet --depth 1 "$auth_url" "$repo_dir" 2>/dev/null; then
              repo_count=$((repo_count + 1))
            fi
          done < "$workdir/clone_urls.txt"

          if [ "$repo_count" -eq 0 ]; then
            echo "No repositories found for $GH_OWNER."
            exit 1
          fi

          cloc "$clone_root" \
            --json \
            --quiet \
            --exclude-dir=.git,node_modules,vendor,dist,build,.next,out,coverage,target,.venv,venv,__pycache__,.idea,.vscode \
            --exclude-ext=lock,map,min.js,min.css \
            > "$workdir/cloc.json"

          total_files="$(jq -r '.SUM.nFiles // 0' "$workdir/cloc.json")"
          total_blank="$(jq -r '.SUM.blank // 0' "$workdir/cloc.json")"
          total_comment="$(jq -r '.SUM.comment // 0' "$workdir/cloc.json")"
          total_code="$(jq -r '.SUM.code // 0' "$workdir/cloc.json")"
          total_lines=$((total_blank + total_comment + total_code))
          updated="$(date -u '+%Y-%m-%d %H:%M UTC')"
          primary_languages="$(jq -r 'to_entries | map(select(.key != "header" and .key != "SUM")) | sort_by(.value.code) | reverse | .[0:6] | map(.key) | join(" / ")' "$workdir/cloc.json")"
          primary_languages_badges="$(jq -r 'to_entries | map(select(.key != "header" and .key != "SUM")) | sort_by(.value.code) | reverse | .[0:6] | map(.key) | @tsv' "$workdir/cloc.json")"

          fmt() {
            printf "%'d" "$1"
          }

          badge_value() {
            printf '%s' "$1" | sed 's/,/%2C/g; s/ /%20/g; s/+/%2B/g; s/#/%23/g; s/&/%26/g; s/\//%2F/g'
          }

          badge_logo() {
            case "$1" in
              TypeScript) echo typescript ;;
              JavaScript) echo javascript ;;
              Python) echo python ;;
              Java) echo openjdk ;;
              "C++") echo cplusplus ;;
              C) echo c ;;
              "C#") echo csharp ;;
              CSS) echo css3 ;;
              HTML) echo html5 ;;
              JSON) echo json ;;
              YAML) echo yaml ;;
              Markdown) echo markdown ;;
              Shell) echo gnu-bash ;;
              *) echo codeforces ;;
            esac
          }

          repo_count_fmt="$(fmt "$repo_count")"
          total_files_fmt="$(fmt "$total_files")"
          total_lines_fmt="$(fmt "$total_lines")"
          total_code_fmt="$(fmt "$total_code")"
          repo_count_badge="$(badge_value "$repo_count_fmt")"
          total_files_badge="$(badge_value "$total_files_fmt")"
          total_lines_badge="$(badge_value "$total_lines_fmt")"
          total_code_badge="$(badge_value "$total_code_fmt")"

          stats_file="$workdir/stats.md"
          {
            echo '<!-- CLOC-STATS:START -->'
            echo '<div align="center">'
            echo
            echo "<img src=\"https://img.shields.io/badge/TOTAL%20LINES-$total_lines_badge-00FF9C?style=for-the-badge&labelColor=0D1117&logo=codacy&logoColor=00FF9C\" height=\"42\" alt=\"Total lines\"/>"
            echo
            echo '<br/><br/>'
            echo
            echo "<img src=\"https://readme-typing-svg.demolab.com?font=Fira+Code&weight=800&size=36&duration=2400&pause=900&color=00FF9C&center=true&vCenter=true&width=720&lines=$total_lines_badge+total+lines;$total_code_badge+code+lines;$repo_count_badge+repositories+scanned\" alt=\"Animated codebase numbers\"/>"
            echo
            echo '<br/><br/>'
            echo
            echo "<img src=\"https://img.shields.io/badge/repos-$repo_count_badge-00FF9C?style=for-the-badge&labelColor=0D1117&logo=github&logoColor=00FF9C\" alt=\"Repositories scanned\"/>"
            echo "<img src=\"https://img.shields.io/badge/source%20files-$total_files_badge-00FF9C?style=for-the-badge&labelColor=0D1117&logo=files&logoColor=00FF9C\" alt=\"Source files\"/>"
            echo "<img src=\"https://img.shields.io/badge/code%20lines-$total_code_badge-00FF9C?style=for-the-badge&labelColor=0D1117&logo=codeforces&logoColor=00FF9C\" alt=\"Code lines\"/>"
            echo
            echo '<br/><br/>'
            echo
            for language in $primary_languages_badges; do
              logo="$(badge_logo "$language")"
              encoded_language="$(badge_value "$language")"
              echo "<img src=\"https://img.shields.io/badge/$encoded_language-0D1117?style=for-the-badge&logo=$logo&logoColor=00FF9C&labelColor=0D1117&color=00FF9C\" alt=\"$language\"/>"
            done
            echo
            echo '<br/><br/>'
            echo
            echo "<sub>Updated automatically with CLOC on $updated</sub>"
            echo
            echo '</div>'
            echo '<!-- CLOC-STATS:END -->'
          } > "$stats_file"

          update_script="$workdir/update_readme.py"
          printf '%s\n' \
            'import os' \
            'from pathlib import Path' \
            '' \
            'readme = Path("README.md")' \
            'stats = Path(os.environ["STATS_FILE"])' \
            'content = readme.read_text(encoding="utf-8")' \
            'replacement = stats.read_text(encoding="utf-8")' \
            'start = "<!-- CLOC-STATS:START -->"' \
            'end = "<!-- CLOC-STATS:END -->"' \
            '' \
            'if start not in content or end not in content:' \
            '    raise SystemExit("CLOC markers not found in README.md")' \
            '' \
            'before = content.split(start, 1)[0]' \
            'after = content.split(end, 1)[1]' \
            'readme.write_text(before + replacement + after, encoding="utf-8")' \
            > "$update_script"
          STATS_FILE="$stats_file" python3 "$update_script"

      - name: Commit updated stats
        run: |
          if git diff --quiet README.md; then
            echo "CLOC stats already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update cloc stats"
          git push
